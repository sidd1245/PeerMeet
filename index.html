<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>PZoom</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        input,
        button {
            margin: 5px;
        }

        #participants {

            border: 1px solid black;

            padding: 10px;

            margin-top: 15px;

            margin-bottom: 20px;
        }

        #activity {

            border: 1px solid black;

            padding: 10px;

            min-height: 120px;

            margin-bottom: 20px;
        }

        #messages {

            border: 1px solid black;

            height: 300px;

            overflow-y: auto;

            padding: 10px;

            margin-top: 20px;
        }

        #videoGrid {

            display: flex;

            gap: 10px;

            flex-wrap: wrap;

            margin-bottom: 20px;

        }

        #videoGrid video {

            border: 1px solid black;

        }

        #participants {

            display: flex;

            flex-direction: column;

            gap: 8px;

            margin-bottom: 20px;

        }

        .participant-card {

            border: 1px solid #ccc;

            border-radius: 8px;

            padding: 10px;

        }

        .participant-name {

            font-weight: bold;

        }

        .participant-status {

            margin-top: 5px;

            font-size: 14px;

        }

    </style>
</head>
<body>

<h1>
    PZoom
</h1>

<h2>Room</h2>

<input
        id="roomInput"
        placeholder="Room ID"
/>

<button id="createRoomBtn">
    Create Room
</button>

<button id="joinRoomBtn">
    Join Room
</button>

<button id="leaveRoomBtn">
    Leave Meeting
</button>
<p>
    Current Room:
    <strong id="currentRoom">
        None
    </strong>
</p>

<button id="copyMeetingLinkBtn">
    Copy Meeting Link
</button>


<p>
    My Peer ID:
    <strong id="peerId">
        Connecting...
    </strong>
</p>

<br>

<input
        id="message"
        placeholder="Message"
/>

<button id="sendBtn">
    Send
</button>

<h2>
    Meeting Info
</h2>

<div id="hostControls" style="display:none;">

    <button id="endMeetingBtn">
        End Meeting
    </button>
    <button id="muteAllBtn">
        Mute All
    </button>
</div>

<h2>
    Controls
</h2>

<button id="muteBtn">
    Mute
</button>

<button id="cameraBtn">
    Camera Off
</button>

<button id="shareScreenBtn">
    Share Screen
</button>

<button id="raiseHandBtn">
    Raise Hand
</button>
<h2>
    Video Grid
</h2>

<div id="videoGrid"></div>
<p>
    Host:
    <span id="hostName">
        Unknown
    </span>
</p>
<h2>
    Participants
    (<span id="participantCount">0</span>)
</h2>

<div id="participants"></div>

<h2>
    Activity
</h2>

<div id="activity"></div>

<h2>
    Log
</h2>

<div id="messages"></div>

<h2>
    Chat
</h2>
<div id="chatMessages"></div>
<script
        type="module"
        src="/src/main.js"
></script>

</body>
</html>
