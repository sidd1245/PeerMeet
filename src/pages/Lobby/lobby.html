<section
        id="lobbyPage"
        class="lobby-page"
>
    <header class="lobby-header">
        <div class="brand-mark">
            <span class="brand-icon">P</span>
            <div>
                <h1>PeerMeet</h1>
            </div>
        </div>
        <div
                id="appStatus"
                class="status-pill"
                data-state="connecting"
        >
            Connecting
        </div>
    </header>

    <main class="lobby-layout">
        <section class="lobby-card" aria-label="Meeting setup">
            <div class="signed-in-user">
                <span class="section-label">Signed in as</span>
                <h3 id="signedInName"></h3>
                <p id="signedInEmail"></p>
                <br>
                <button id="logoutBtn" class="btn btn-secondary btn-full">
                    Logout
                </button>
            </div>
            <button id="createRoomBtn" class="btn btn-primary btn-full">
                <span class="btn-icon">+</span>
                Create meeting
            </button>

            <div class="divider">
                <span>or join with a code</span>
            </div>

            <div class="join-row">
                <div class="field-group">
                    <label for="roomInput">Meeting code</label>
                    <input
                            id="roomInput"
                            class="text-input"
                            placeholder="Enter a code"
                    >
                </div>
                <button
                        id="joinRoomBtn"
                        class="btn btn-secondary"
                >
                    Join
                </button>
            </div>
            <div class = "divider"><h3>Meeting History</h3></div>
            <div class = "meeting-history-scroll"><div id="meetingHistoryMount"></div></div>
        </section>
    </main>
</section>
