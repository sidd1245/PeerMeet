info:
  name: Register User
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/auth/register
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name":"Bill",
        "email":"Bill123@gmail.com",
        "password":"@word123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
