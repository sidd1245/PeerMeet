info:
  name: Register User
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/auth/register
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Siddharth",
        "email": "sid@example.com",
        "password": "hello123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
