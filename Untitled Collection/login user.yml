info:
  name: login user
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:3000/api/auth/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "email": "sid@example.com",
          "password": "hello123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
